<div class="login-container">
  <div class="login-card">
    <h1>Shopping App</h1>
    <h2>Login</h2>

    <form (ngSubmit)="onLogin()" class="login-form">
      <div class="form-group">
        <label for="email">Email Address:</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your email address"
          [disabled]="(isLoading$ | async) ?? false"
        />
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          [disabled]="(isLoading$ | async) ?? false"
        />
      </div>

      <div class="forgot-password">
        <a href="javascript:void(0)" (click)="onForgotPassword()">Forgot Password?</a>
      </div>

      <button
        type="submit"
        [disabled]="!email.trim() || !password.trim() || ((isLoading$ | async) ?? false)"
        class="login-btn"
      >
        {{ (isLoading$ | async) ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <div *ngIf="error$ | async as error" class="error-message">
      {{ error }}
    </div>

    <p class="demo-note">Test: test@example.com / password123 or sign up</p>

    <div class="signup-section">
      <p class="signup-text">Don't have an account? <button (click)="onSignup()" class="signup-link">Sign Up</button></p>
    </div>
  </div>
</div>
