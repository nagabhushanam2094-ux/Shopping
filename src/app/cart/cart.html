<div class="cart-container">
  <div class="cart-header">
    <h2>Shopping Cart</h2>
    <button *ngIf="(cartItems$ | async)?.length" (click)="clearAllItems()" class="clear-btn">Clear Cart</button>
  </div>

  <form class="barcode-scan" (ngSubmit)="addByBarcode()">
    <label for="barcodeInput">Scan Barcode</label>
    <div class="scan-row">
      <input
        #scanInput
        id="barcodeInput"
        type="text"
        name="barcode"
        placeholder="Scan or enter barcode"
        [(ngModel)]="scannedBarcode"
        (input)="onScanInputChange()"
        autocomplete="off"
      />
      <button type="submit" class="scan-btn" [disabled]="scanLoading">
        {{ scanLoading ? 'Adding...' : 'Add to Cart' }}
      </button>
    </div>
    <p *ngIf="scanStatus" class="scan-status">{{ scanStatus }}</p>
    <p *ngIf="scanError" class="scan-error">{{ scanError }}</p>
  </form>

  <div *ngIf="!(cartItems$ | async)?.length" class="empty-cart">
    <p>Your cart is empty</p>
  </div>

  <div *ngIf="(cartItems$ | async)?.length" class="cart-content">
    <div class="cart-items">
      <div *ngFor="let item of cartItems$ | async" class="cart-item">
        <div class="item-image">
          <img [src]="item.image" [alt]="item.name" />
        </div>
        <div class="item-details">
          <h3>{{ item.name }}</h3>
          <p class="category">{{ item.category }}</p>
          <p class="price">${{ item.price.toFixed(2) }}</p>
        </div>
        <div class="item-quantity">
          <button (click)="updateQuantity(item.id, item.quantity - 1)" class="qty-btn">-</button>
          <span class="qty-value">{{ item.quantity }}</span>
          <button (click)="updateQuantity(item.id, item.quantity + 1)" class="qty-btn">+</button>
        </div>
        <div class="item-total">
          <p>${{ (item.price * item.quantity).toFixed(2) }}</p>
        </div>
        <button (click)="removeItem(item.id)" class="remove-btn">Remove</button>
      </div>
    </div>

    <div class="cart-summary">
      <div class="summary-row">
        <span>Items: {{ (cartItemCount$ | async) }}</span>
      </div>
      <div class="summary-row total">
        <span>Total:</span>
        <span>${{ (cartTotal$ | async)?.toFixed(2) }}</span>
      </div>
      <button class="checkout-btn" (click)="proceedToCheckout()">Proceed to Checkout</button>
    </div>
  </div>
</div>
