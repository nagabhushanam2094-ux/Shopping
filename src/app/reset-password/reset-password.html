    <div class="reset-password-container">
  <div class="reset-password-card">
    <h1>Shopping App</h1>
    <h2>Create New Password</h2>

    <!-- Error or Invalid Link -->
    <div *ngIf="errorMessage && !isSubmitted" class="error-message">
      {{ errorMessage }}
    </div>

    <!-- Invalid Link Actions -->
    <div *ngIf="errorMessage && !isSubmitted && !token" class="invalid-link-actions">
      <button (click)="requestNewReset()" class="action-btn">Request New Reset Link</button>
      <button (click)="backToLogin()" class="action-btn secondary">Back to Login</button>
    </div>

    <!-- Reset Form -->
    <form *ngIf="!isSubmitted && token && email" (ngSubmit)="onSubmit()" class="reset-form">
      <div class="form-group">
        <label for="newPassword">New Password:</label>
        <div class="password-input-group">
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="newPassword"
            (input)="checkPasswordStrength()"
            name="newPassword"
            id="newPassword"
            placeholder="Enter new password (min 8 characters)"
            [disabled]="isLoading"
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="toggle-btn"
            [disabled]="isLoading"
          >
            {{ showPassword ? '👁️‍🗨️' : '👁️' }}
          </button>
        </div>
        <div *ngIf="passwordStrength" [ngClass]="'strength-meter strength-' + passwordStrength">
          <span>Strength: {{ passwordStrength | uppercase }}</span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password:</label>
        <div class="password-input-group">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            id="confirmPassword"
            placeholder="Re-enter your password"
            [disabled]="isLoading"
          />
          <button
            type="button"
            (click)="toggleConfirmPasswordVisibility()"
            class="toggle-btn"
            [disabled]="isLoading"
          >
            {{ showConfirmPassword ? '👁️‍🗨️' : '👁️' }}
          </button>
        </div>
        <div
          *ngIf="newPassword && confirmPassword && newPassword !== confirmPassword"
          class="password-mismatch"
        >
          ⚠️ Passwords do not match
        </div>
        <div
          *ngIf="newPassword && confirmPassword && newPassword === confirmPassword"
          class="password-match"
        >
          ✓ Passwords match
        </div>
      </div>

      <button
        type="submit"
        [disabled]="!newPassword.trim() || !confirmPassword.trim() || isLoading"
        class="reset-btn"
      >
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

    <!-- Success Message -->
    <div *ngIf="isSubmitted" class="success-section">
      <div class="success-icon">✓</div>
      <div class="success-message">
        {{ successMessage }}
      </div>
      <p class="redirect-note">Redirecting to login page...</p>
    </div>
  </div>
</div>
