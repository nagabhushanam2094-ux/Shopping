  </defs>

  <rect width="600" height="600" fill="url(#bg)" />

  <g transform="translate(80 120)">
    <ellipse cx="220" cy="250" rx="180" ry="44" fill="#cfd6e0" opacity="0.55" />

    <circle cx="220" cy="190" r="165" fill="url(#plate)" />
    <circle cx="220" cy="190" r="128" fill="#fbfcfe" stroke="#d8dee8" stroke-width="8" />
    <circle cx="220" cy="190" r="16" fill="#dde3ec" />

    <g opacity="0.92">
      <circle cx="115" cy="85" r="88" fill="#ffffff" stroke="#d8dee8" stroke-width="10" />
      <circle cx="115" cy="85" r="56" fill="#f8fafc" />

      <circle cx="325" cy="80" r="88" fill="#ffffff" stroke="#d8dee8" stroke-width="10" />
      <circle cx="325" cy="80" r="56" fill="#f8fafc" />
    </g>
  </g>
</svg>
