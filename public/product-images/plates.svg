<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Plates illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f8fb" />
      <stop offset="100%" stop-color="#e8edf4" />
    </linearGradient>
    <radialGradient id="plate" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#f3f5f8" />
      <stop offset="100%" stop-color="#d7dde6" />
